<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Claude Chat</title>
<script src="https://js.puter.com/v2/"></script>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0d0f14;
    --surface: #13161e;
    --surface2: #1a1e2a;
    --border: #232736;
    --accent: #5e9bff;
    --accent2: #a78bfa;
    --text: #e8eaf0;
    --muted: #6b7280;
    --user-bg: #1c2a45;
    --ai-bg: #161922;
    --danger: #f87171;
    --success: #34d399;
  }

  body {
    font-family: 'Sora', sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* Header */
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 24px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
    flex-shrink: 0;
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 15px;
    font-weight: 600;
    letter-spacing: -0.3px;
  }

  .logo-icon {
    width: 28px; height: 28px;
    border-radius: 8px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    display: flex; align-items: center; justify-content: center;
    font-size: 14px;
  }

  .model-badge {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    padding: 3px 8px;
    border-radius: 20px;
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--muted);
    cursor: pointer;
    transition: all 0.2s;
    position: relative;
  }
  .model-badge:hover { border-color: var(--accent); color: var(--accent); }

  /* Model dropdown */
  .model-selector { position: relative; }
  .model-dropdown {
    display: none;
    position: absolute;
    top: calc(100% + 6px);
    right: 0;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    overflow: hidden;
    min-width: 200px;
    z-index: 100;
    box-shadow: 0 8px 32px rgba(0,0,0,0.5);
  }
  .model-dropdown.open { display: block; }
  .model-option {
    padding: 10px 14px;
    font-size: 12px;
    font-family: 'JetBrains Mono', monospace;
    cursor: pointer;
    transition: background 0.15s;
    display: flex; align-items: center; gap: 8px;
  }
  .model-option:hover { background: var(--border); }
  .model-option.active { color: var(--accent); }
  .model-option .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--muted); flex-shrink: 0; }
  .model-option.active .dot { background: var(--accent); }

  .header-actions { display: flex; align-items: center; gap: 10px; }

  .btn-icon {
    width: 32px; height: 32px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--muted);
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    font-size: 14px;
    transition: all 0.2s;
  }
  .btn-icon:hover { border-color: var(--accent); color: var(--accent); background: rgba(94,155,255,0.06); }

  /* Main layout */
  main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }

  /* Messages */
  #messages {
    flex: 1;
    overflow-y: auto;
    padding: 24px 0 8px;
    scroll-behavior: smooth;
  }
  #messages::-webkit-scrollbar { width: 4px; }
  #messages::-webkit-scrollbar-track { background: transparent; }
  #messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

  .message-wrapper {
    padding: 6px 24px;
    display: flex;
    gap: 12px;
    animation: fadeUp 0.25s ease;
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .avatar {
    width: 30px; height: 30px;
    border-radius: 8px;
    flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    font-size: 13px;
    margin-top: 2px;
  }
  .avatar.user { background: var(--user-bg); border: 1px solid #2d4a7a; color: var(--accent); }
  .avatar.assistant { background: linear-gradient(135deg, #1f2d4a, #2a1f4a); border: 1px solid #3a2d6a; color: var(--accent2); }

  .bubble-col { flex: 1; min-width: 0; }

  .bubble-name {
    font-size: 11px;
    font-weight: 600;
    color: var(--muted);
    margin-bottom: 4px;
    letter-spacing: 0.3px;
    text-transform: uppercase;
  }

  .bubble {
    font-size: 14px;
    line-height: 1.7;
    color: var(--text);
    max-width: 760px;
  }
  .bubble p { margin-bottom: 10px; }
  .bubble p:last-child { margin-bottom: 0; }
  .bubble code {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12.5px;
    background: var(--surface2);
    border: 1px solid var(--border);
    padding: 2px 6px;
    border-radius: 4px;
    color: #a5d6ff;
  }
  .bubble pre {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px 16px;
    overflow-x: auto;
    margin: 10px 0;
  }
  .bubble pre code {
    background: none; border: none; padding: 0;
    font-size: 12.5px; line-height: 1.6;
  }

  .bubble-actions {
    display: flex; gap: 6px; margin-top: 8px;
    opacity: 0; transition: opacity 0.2s;
  }
  .message-wrapper:hover .bubble-actions { opacity: 1; }
  .bubble-btn {
    font-size: 11px; padding: 3px 8px; border-radius: 6px;
    border: 1px solid var(--border); background: transparent;
    color: var(--muted); cursor: pointer; transition: all 0.15s;
    font-family: 'Sora', sans-serif;
  }
  .bubble-btn:hover { border-color: var(--accent); color: var(--accent); }

  /* Thinking indicator */
  .thinking .bubble { display: flex; gap: 5px; align-items: center; padding: 4px 0; }
  .dot-bounce {
    width: 7px; height: 7px; border-radius: 50%;
    background: var(--accent2);
    animation: bounce 1.2s infinite ease-in-out;
  }
  .dot-bounce:nth-child(2) { animation-delay: 0.15s; }
  .dot-bounce:nth-child(3) { animation-delay: 0.3s; }
  @keyframes bounce {
    0%, 80%, 100% { transform: scale(0.6); opacity: 0.4; }
    40% { transform: scale(1); opacity: 1; }
  }

  /* Empty state */
  #empty-state {
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    flex: 1; gap: 12px; padding: 40px 24px;
    color: var(--muted); text-align: center;
  }
  .empty-icon {
    width: 56px; height: 56px; border-radius: 16px;
    background: linear-gradient(135deg, rgba(94,155,255,0.15), rgba(167,139,250,0.15));
    border: 1px solid rgba(94,155,255,0.2);
    display: flex; align-items: center; justify-content: center;
    font-size: 24px; margin-bottom: 6px;
  }
  .empty-title { font-size: 18px; font-weight: 600; color: var(--text); }
  .empty-sub { font-size: 13px; max-width: 340px; line-height: 1.6; }

  .suggestions { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; margin-top: 8px; }
  .suggestion-chip {
    font-size: 12px; padding: 7px 14px; border-radius: 20px;
    border: 1px solid var(--border); background: var(--surface2);
    color: var(--text); cursor: pointer; transition: all 0.2s;
    font-family: 'Sora', sans-serif;
  }
  .suggestion-chip:hover { border-color: var(--accent); color: var(--accent); background: rgba(94,155,255,0.06); }

  /* Input area */
  .input-area {
    padding: 12px 24px 20px;
    flex-shrink: 0;
  }

  .input-box {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    display: flex; align-items: flex-end; gap: 10px;
    padding: 10px 12px 10px 16px;
    transition: border-color 0.2s;
  }
  .input-box:focus-within { border-color: rgba(94,155,255,0.5); }

  #user-input {
    flex: 1; background: transparent; border: none; outline: none;
    color: var(--text); font-family: 'Sora', sans-serif;
    font-size: 14px; line-height: 1.6; resize: none;
    max-height: 180px; min-height: 24px;
    padding: 2px 0;
  }
  #user-input::placeholder { color: var(--muted); }

  .input-actions { display: flex; align-items: center; gap: 6px; flex-shrink: 0; }

  #send-btn {
    width: 34px; height: 34px; border-radius: 9px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border: none; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.2s; flex-shrink: 0;
    color: white; font-size: 14px;
  }
  #send-btn:hover { opacity: 0.85; transform: scale(1.04); }
  #send-btn:disabled { opacity: 0.3; cursor: not-allowed; transform: none; }

  .input-footer {
    display: flex; align-items: center; justify-content: space-between;
    padding: 6px 4px 0;
    font-size: 11px; color: var(--muted);
  }

  /* System prompt panel */
  .sys-panel {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    margin: 0 0 10px;
    overflow: hidden;
    transition: max-height 0.3s ease;
    max-height: 0;
  }
  .sys-panel.open { max-height: 200px; }
  .sys-panel textarea {
    width: 100%; background: transparent; border: none; outline: none;
    color: var(--text); font-family: 'Sora', sans-serif; font-size: 12.5px;
    line-height: 1.6; resize: none; padding: 12px 14px;
    min-height: 80px;
  }
  .sys-panel textarea::placeholder { color: var(--muted); }

  /* Toast */
  .toast {
    position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%);
    background: var(--surface2); border: 1px solid var(--border);
    padding: 8px 16px; border-radius: 8px; font-size: 12px;
    color: var(--text); pointer-events: none;
    opacity: 0; transition: opacity 0.3s;
    z-index: 999;
  }
  .toast.show { opacity: 1; }

  /* Scrollbar for textarea */
  #user-input::-webkit-scrollbar { width: 3px; }
  #user-input::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
</style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-icon">✦</div>
    Claude Chat
  </div>
  <div class="header-actions">
    <div class="model-selector">
      <div class="model-badge" id="model-badge" onclick="toggleDropdown()">claude-opus-4-6 ▾</div>
      <div class="model-dropdown" id="model-dropdown">
        <div class="model-option active" onclick="selectModel('claude-opus-4-6')">
          <span class="dot"></span>claude-opus-4-6
        </div>
        <div class="model-option" onclick="selectModel('claude-sonnet-4-5')">
          <span class="dot"></span>claude-sonnet-4-5
        </div>
        <div class="model-option" onclick="selectModel('claude-haiku-4-5-20251001')">
          <span class="dot"></span>claude-haiku-4-5
        </div>
      </div>
    </div>
    <button class="btn-icon" title="System prompt" onclick="toggleSysPanel()">⚙</button>
    <button class="btn-icon" title="Clear chat" onclick="clearChat()">🗑</button>
  </div>
</header>

<main>
  <div id="messages">
    <div id="empty-state">
      <div class="empty-icon">✦</div>
      <div class="empty-title">What's on your mind?</div>
      <div class="empty-sub">Ask me anything — code, writing, analysis, ideas, or just a conversation.</div>
      <div class="suggestions">
        <div class="suggestion-chip" onclick="suggest('Write a short poem about the ocean')">🌊 Write a poem</div>
        <div class="suggestion-chip" onclick="suggest('Explain how async/await works in JavaScript')">⚡ Explain async/await</div>
        <div class="suggestion-chip" onclick="suggest('Give me 5 ideas for a side project')">💡 Side project ideas</div>
        <div class="suggestion-chip" onclick="suggest('Summarize the concept of neural networks')">🧠 Neural networks</div>
      </div>
    </div>
  </div>

  <div class="input-area">
    <div class="sys-panel" id="sys-panel">
      <textarea id="sys-prompt" placeholder="System prompt — give Claude a persona, context, or instructions…" rows="3"></textarea>
    </div>
    <div class="input-box">
      <textarea id="user-input" placeholder="Message Claude…" rows="1" onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
      <div class="input-actions">
        <button id="send-btn" onclick="sendMessage()" title="Send (Enter)">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
        </button>
      </div>
    </div>
    <div class="input-footer">
      <span>Enter to send · Shift+Enter for new line</span>
      <span id="char-count"></span>
    </div>
  </div>
</main>

<div class="toast" id="toast"></div>

<script>
  let model = 'claude-opus-4-6';
  let history = [];
  let isStreaming = false;
  let sysPanelOpen = false;

  const messagesEl = document.getElementById('messages');
  const inputEl = document.getElementById('user-input');
  const sendBtn = document.getElementById('send-btn');
  const emptyState = document.getElementById('empty-state');

  // Auto-resize textarea
  function autoResize(el) {
    el.style.height = 'auto';
    el.style.height = Math.min(el.scrollHeight, 180) + 'px';
    document.getElementById('char-count').textContent = el.value.length > 0 ? el.value.length + ' chars' : '';
  }

  function handleKey(e) {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
  }

  function toggleDropdown() {
    document.getElementById('model-dropdown').classList.toggle('open');
  }

  document.addEventListener('click', (e) => {
    if (!e.target.closest('.model-selector')) {
      document.getElementById('model-dropdown').classList.remove('open');
    }
  });

  function selectModel(m) {
    model = m;
    document.getElementById('model-badge').textContent = m + ' ▾';
    document.querySelectorAll('.model-option').forEach(el => {
      el.classList.toggle('active', el.textContent.trim() === m);
      el.querySelector('.dot').style.background = el.textContent.trim() === m ? 'var(--accent)' : 'var(--muted)';
    });
    document.getElementById('model-dropdown').classList.remove('open');
    showToast('Switched to ' + m);
  }

  function toggleSysPanel() {
    sysPanelOpen = !sysPanelOpen;
    document.getElementById('sys-panel').classList.toggle('open', sysPanelOpen);
  }

  function clearChat() {
    history = [];
    messagesEl.innerHTML = '';
    messagesEl.appendChild(emptyState);
    emptyState.style.display = 'flex';
    showToast('Chat cleared');
  }

  function suggest(text) {
    inputEl.value = text;
    autoResize(inputEl);
    sendMessage();
  }

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2000);
  }

  function addMessage(role, content, isThinking = false) {
    if (emptyState.style.display !== 'none') emptyState.style.display = 'none';

    const wrap = document.createElement('div');
    wrap.className = 'message-wrapper' + (isThinking ? ' thinking' : '');

    const avatar = document.createElement('div');
    avatar.className = 'avatar ' + role;
    avatar.textContent = role === 'user' ? '👤' : '✦';

    const col = document.createElement('div');
    col.className = 'bubble-col';

    const name = document.createElement('div');
    name.className = 'bubble-name';
    name.textContent = role === 'user' ? 'You' : 'Claude';

    const bubble = document.createElement('div');
    bubble.className = 'bubble';

    if (isThinking) {
      bubble.innerHTML = '<div class="dot-bounce"></div><div class="dot-bounce"></div><div class="dot-bounce"></div>';
    } else {
      bubble.innerHTML = formatMessage(content);
      if (role === 'assistant') {
        const actions = document.createElement('div');
        actions.className = 'bubble-actions';
        actions.innerHTML = `<button class="bubble-btn" onclick="copyText(this, \`${escapeBacktick(content)}\`)">Copy</button>`;
        col.appendChild(name);
        col.appendChild(bubble);
        col.appendChild(actions);
        wrap.appendChild(avatar);
        wrap.appendChild(col);
        messagesEl.appendChild(wrap);
        scrollBottom();
        return wrap;
      }
    }

    col.appendChild(name);
    col.appendChild(bubble);
    wrap.appendChild(avatar);
    wrap.appendChild(col);
    messagesEl.appendChild(wrap);
    scrollBottom();
    return wrap;
  }

  function escapeBacktick(str) {
    return str.replace(/\\/g, '\\\\').replace(/`/g, '\\`').replace(/\$/g, '\\$');
  }

  function copyText(btn, text) {
    navigator.clipboard.writeText(text).then(() => {
      btn.textContent = 'Copied!';
      setTimeout(() => btn.textContent = 'Copy', 1500);
    });
  }

  function formatMessage(text) {
    // Code blocks
    text = text.replace(/```(\w*)\n?([\s\S]*?)```/g, (_, lang, code) =>
      `<pre><code>${escapeHtml(code.trim())}</code></pre>`);
    // Inline code
    text = text.replace(/`([^`]+)`/g, (_, c) => `<code>${escapeHtml(c)}</code>`);
    // Bold
    text = text.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
    // Italics
    text = text.replace(/\*(.*?)\*/g, '<em>$1</em>');
    // Newlines
    text = text.split('\n\n').map(p => `<p>${p.replace(/\n/g, '<br>')}</p>`).join('');
    return text;
  }

  function escapeHtml(str) {
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  function scrollBottom() {
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  async function sendMessage() {
    const text = inputEl.value.trim();
    if (!text || isStreaming) return;

    isStreaming = true;
    sendBtn.disabled = true;
    inputEl.value = '';
    inputEl.style.height = 'auto';
    document.getElementById('char-count').textContent = '';

    // Add user message
    addMessage('user', text);
    history.push({ role: 'user', content: text });

    // Show thinking
    const thinkingEl = addMessage('assistant', '', true);

    const sysPrompt = document.getElementById('sys-prompt').value.trim();

    try {
      const options = { model };
      if (sysPrompt) options.system = sysPrompt;

      const response = await puter.ai.chat(history, options);
      const reply = response.message.content[0].text;

      // Remove thinking
      thinkingEl.remove();

      // Add real response
      history.push({ role: 'assistant', content: reply });
      addMessage('assistant', reply);

    } catch (err) {
      thinkingEl.remove();
      const errWrap = document.createElement('div');
      errWrap.className = 'message-wrapper';
      errWrap.innerHTML = `
        <div class="avatar assistant">⚠</div>
        <div class="bubble-col">
          <div class="bubble-name">Error</div>
          <div class="bubble" style="color:var(--danger)">Something went wrong: ${err.message || 'Unknown error'}</div>
        </div>`;
      messagesEl.appendChild(errWrap);
      scrollBottom();
    }

    isStreaming = false;
    sendBtn.disabled = false;
    inputEl.focus();
  }
</script>
</body>
</html>
